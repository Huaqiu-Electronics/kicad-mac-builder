name: KiCad client packaging

on:
  release:
    branches: [master]
    types: [published]
  workflow_dispatch:

jobs:
  create_kicad_archive:
    runs-on: macos-14   # Switch to macOS 14 for Xcode 16

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Show initial disk usage
        run: |
          echo "Initial disk usage:"
          df -h

      - name: Free disk space (keep Xcode 16.2)
        run: |
          echo "Cleaning large preinstalled software..."

          # The Xcode version to keep
          KEEP_XCODE="/Applications/Xcode_16.2.app"
          KEEP_SYMLINK="/Applications/Xcode.app"

          # Remove all other Xcodes
          for xcode in /Applications/Xcode*.app; do
            if [ "$xcode" != "$KEEP_XCODE" ] && [ "$xcode" != "$KEEP_SYMLINK" ]; then
              echo "Removing $xcode ..."
              sudo rm -rf "$xcode"
            fi
          done

          # Optional: remove old simulators and user Xcode caches
          sudo rm -rf /Library/Developer/CoreSimulator || true
          sudo rm -rf ~/Library/Developer/Xcode || true

          # Ensure Xcode selection points to the version we want
          sudo xcode-select -s "$KEEP_XCODE"

          echo "Selected Xcode version:"
          xcodebuild -version
          clang++ --version

          # Remove Android SDK
          sudo rm -rf /Users/runner/Library/Android || true

          # Cleanup Homebrew caches
          brew cleanup -s || true
          rm -rf "$(brew --cache)" || true

          echo "Disk after cleanup:"
          df -h

      - name: Get latest tag
        id: latest-release
        uses: oprypin/find-latest-tag@v1
        with:
          repository: Huaqiu-Electronics/kicad-mac-builder
          releases-only: true

      - name: Install build tools
        run: |
          brew update
          brew install ccache ninja

      - name: Setup ccache
        run: |
          echo 'export CC="ccache clang"' >> $GITHUB_ENV
          echo 'export CXX="ccache clang++"' >> $GITHUB_ENV

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: macos-ccache-${{ github.ref }}

      - name: Bootstrap
        run: |
          ./ci/arm64-on-arm64/bootstrap-arm64-on-arm64.sh
          ./ci/x86_64-on-arm64/bootstrap-x86_64-on-arm64.sh

      - name: Show disk before build
        run: df -h

      - name: Build KiCad
        env:
          TAG: ${{ steps.latest-release.outputs.tag }}
          KICAD_REF: release/10.0
          EXTRA_VERSION: -huaqiu
          RELEASE_ARG: --release
          SYMBOLS_REF: ${{ steps.latest-release.outputs.tag }}
          FOOTPRINTS_REF: ${{ steps.latest-release.outputs.tag }}
          PACKAGES3D_REF: ${{ steps.latest-release.outputs.tag }}
          TEMPLATES_REF: ${{ steps.latest-release.outputs.tag }}
          RELEASE_NAME: huaqiu-${{ steps.latest-release.outputs.tag }}-macos
          DOCS_TARBALL_URL: https://gitlab.com/kicad/services/kicad-doc/-/archive/${{ steps.latest-release.outputs.tag }}/kicad-doc-${{ steps.latest-release.outputs.tag }}.tar.gz
        run: |
          ./ci/src/make-universal-build-with-refs.sh

      - name: Show DMG files
        run: |
          echo "Listing DMG files:"
          find . -name "*.dmg"

      - name: Show disk after build
        run: df -h

      - name: Collect and rename DMGs
        run: |
          mkdir -p release-dmg

          for f in build-arm64/dmg/*.dmg; do
            name=$(basename "$f" .dmg)
            cp "$f" "release-dmg/${name}-arm64.dmg"
          done || true

          for f in build-x86_64/dmg/*.dmg; do
            name=$(basename "$f" .dmg)
            cp "$f" "release-dmg/${name}-x86_64.dmg"
          done || true

          for f in build-universal/build/dmg/*.dmg; do
            name=$(basename "$f" .dmg)
            cp "$f" "release-dmg/${name}-universal.dmg"
          done || true

          echo "Final DMGs:"
          ls -lh release-dmg        

      - name: Upload DMG to release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.HUAQIU_ELECTRONICS_TOKEN }}
          file: release-dmg/*.dmg
          overwrite: true
          tag: ${{ steps.latest-release.outputs.tag }}